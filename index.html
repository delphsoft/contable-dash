<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Contable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">C</div>
        <span class="logo-text">Contable</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-view="overview">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".3"/></svg>
          <span>Overview</span>
        </a>
        <a class="nav-item" data-view="ventas">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12 L5 8 L8 10 L11 5 L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Ventas</span>
        </a>
        <a class="nav-item" data-view="proveedores">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Proveedores</span>
        </a>
        <a class="nav-item" data-view="breakeven">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 14 L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="2.5" fill="currentColor"/></svg>
          <span>Break-even</span>
        </a>
        <a class="nav-item" data-view="alertas">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 7v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r=".75" fill="currentColor"/></svg>
          <span>Alertas</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="period-badge">Oct 25 — Feb 26</div>
        <div class="sidebar-meta">5 meses · datos reales</div>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title" id="page-title">Overview</h1>
          <div class="page-sub" id="page-sub">Resumen ejecutivo del período</div>
        </div>
        <div class="topbar-right">
          <div class="status-dot"></div>
          <span class="status-text">Datos actualizados</span>
        </div>
      </header>
      <div id="view-overview" class="view active"></div>
      <div id="view-ventas" class="view"></div>
      <div id="view-proveedores" class="view"></div>
      <div id="view-breakeven" class="view"></div>
      <div id="view-alertas" class="view"></div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
