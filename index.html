<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FacturaFácil + Contable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css"/>
  <link rel="stylesheet" href="/src/style.css"/>
</head>
<body>
<div id="app">

  <aside class="rail" role="navigation" aria-label="Navegación principal">
    <div class="rail-logo"><i class="ti ti-chart-dots-3"></i></div>

    <!-- Contable -->
    <button class="rail-item active" data-view="ct-overview" aria-label="Overview">
      <i class="ti ti-layout-dashboard"></i>
      <div class="corner-top"></div>
      <div class="corner-bottom"></div>
      <span class="rail-tt">Overview</span>
    </button>
    <button class="rail-item" data-view="ct-estado" aria-label="Estado Contable">
      <i class="ti ti-file-analytics"></i>
      <span class="rail-tt">Estado Contable</span>
    </button>
    <button class="rail-item" data-view="ct-proveedores" aria-label="Proveedores">
      <i class="ti ti-users"></i>
      <span class="rail-tt">Proveedores</span>
    </button>
    <button class="rail-item" data-view="ct-breakeven" aria-label="Break-even">
      <i class="ti ti-target"></i>
      <span class="rail-tt">Break-even</span>
    </button>
    <button class="rail-item rail-has-badge" data-view="ct-alertas" aria-label="Alertas">
      <i class="ti ti-bell"></i>
      <span class="rail-badge">3</span>
      <span class="rail-tt">Alertas</span>
    </button>
    <button class="rail-item" data-view="ct-drive" aria-label="Google Drive">
      <i class="ti ti-brand-google-drive"></i>
      <span class="rail-tt">Google Drive</span>
    </button>

    <!-- Nuevos módulos contables -->
    <button class="rail-item" data-view="ct-iva" aria-label="IVA">
      <i class="ti ti-receipt-tax"></i>
      <span class="rail-tt">IVA</span>
    </button>
    <button class="rail-item" data-view="ct-compras" aria-label="Compras">
      <i class="ti ti-shopping-cart"></i>
      <span class="rail-tt">Compras</span>
    </button>
    <button class="rail-item" data-view="ct-sueldos" aria-label="Sueldos">
      <i class="ti ti-users-group"></i>
      <span class="rail-tt">Sueldos</span>
    </button>
    <button class="rail-item" data-view="ct-cron" aria-label="Sync ARCA">
      <i class="ti ti-refresh"></i>
      <span class="rail-tt">Sync ARCA</span>
    </button>

    <div class="rail-divider"></div>

    <!-- Facturación -->
    <button class="rail-item" data-view="ff-dashboard" aria-label="Facturas">
      <i class="ti ti-receipt"></i>
      <span class="rail-tt">Facturas</span>
    </button>
    <button class="rail-item" data-view="ff-mercadopago" aria-label="MercadoPago">
      <i class="ti ti-credit-card"></i>
      <span class="rail-tt">MercadoPago</span>
    </button>
    <button class="rail-item" data-view="ff-impuestos" aria-label="Impuestos">
      <i class="ti ti-receipt-tax"></i>
      <span class="rail-tt">Impuestos</span>
    </button>

    <div class="rail-spacer"></div>

    <!-- Super admin — hidden, subtle -->
    <button class="rail-item rail-admin" data-view="ct-superadmin" aria-label="Super Admin">
      <i class="ti ti-lock"></i>
      <span class="rail-tt">Super Admin</span>
    </button>
    <div class="rail-avatar" aria-label="Perfil">A</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="page-title">Overview</h1>
        <p class="page-sub" id="page-sub">Oct 2025 — Feb 2026 · 5 meses</p>
      </div>
      <div class="topbar-right">
        <div id="period-chips" class="period-chips">
          <button class="period-chip active">Todo el período</button>
          <button class="period-chip">Dic-25</button>
          <button class="period-chip">Ene-26</button>
          <button class="period-chip">Feb-26</button>
        </div>
        <button class="btn-icon" aria-label="Buscar"><i class="ti ti-search"></i></button>
        <button class="btn-icon" aria-label="Notificaciones"><i class="ti ti-bell"></i></button>
        <button class="btn-primary" id="topbar-action" style="display:none">
          <i class="ti ti-sparkles"></i>
          <span id="topbar-action-label">Analizar ↗</span>
        </button>
        <span class="tb-dots">···</span>
      </div>
    </header>

    <!-- Vistas existentes -->
    <div id="view-ct-overview"    class="view active"></div>
    <div id="view-ct-estado"      class="view"></div>
    <div id="view-ct-proveedores" class="view"></div>
    <div id="view-ct-breakeven"   class="view"></div>
    <div id="view-ct-alertas"     class="view"></div>
    <div id="view-ct-drive"       class="view"></div>
    <div id="view-ct-superadmin"  class="view"></div>
    <div id="view-ff-dashboard"   class="view"></div>
    <div id="view-ff-mercadopago" class="view"></div>
    <div id="view-ff-impuestos"   class="view"></div>

    <!-- Vistas nuevas -->
    <div id="view-ct-iva"         class="view"></div>
    <div id="view-ct-compras"     class="view"></div>
    <div id="view-ct-sueldos"     class="view"></div>
    <div id="view-ct-cron"        class="view"></div>
  </main>

</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
